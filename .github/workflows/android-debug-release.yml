name: Android Debug APK Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, contoh: v1.0.0-debug"
        required: true
        default: "v1.0.0-debug"
        type: string

  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build-debug-release:
    name: Build Debug APK and Upload to Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Check Java and Gradle version
        shell: bash
        run: |
          set -euo pipefail
          java -version
          gradle --version

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:assembleDebug --no-daemon

      - name: Prepare APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::Release tag kosong."
            exit 1
          fi

          APK_PATH="$(find . -path "*/build/outputs/apk/debug/*.apk" -type f | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "::error::Debug APK tidak ditemukan."
            find . -name "*.apk" -type f || true
            exit 1
          fi

          mkdir -p dist
          APK_NAME="ZaShortsDownloader-debug-${TAG}.apk"
          APK_FILE="dist/${APK_NAME}"

          cp "$APK_PATH" "$APK_FILE"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

          echo "APK siap:"
          ls -lah "$APK_FILE"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.tag }}-debug-apk
          path: ${{ steps.apk.outputs.apk_file }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.apk.outputs.tag }}
          APK_FILE: ${{ steps.apk.outputs.apk_file }}
        run: |
          set -euo pipefail

          echo "Repository: $GH_REPO"
          echo "Release tag: $TAG"
          echo "APK file: $APK_FILE"

          if [ ! -f "$APK_FILE" ]; then
            echo "::error::APK file tidak ditemukan: $APK_FILE"
            exit 1
          fi

          gh auth status --hostname github.com

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG sudah ada. Upload ulang APK..."
            gh release upload "$TAG" "$APK_FILE" \
              --repo "$GH_REPO" \
              --clobber
          else
            echo "Membuat release $TAG..."
            gh release create "$TAG" "$APK_FILE" \
              --repo "$GH_REPO" \
              --title "$TAG" \
              --notes "Debug APK otomatis dari GitHub Actions. Commit: $GITHUB_SHA" \
              --target "$GITHUB_SHA" \
              --prerelease
          fi

          echo "Cek asset release:"
          gh release view "$TAG" \
            --repo "$GH_REPO" \
            --json tagName,name,assets

          echo "APK berhasil diupload ke GitHub Release."
